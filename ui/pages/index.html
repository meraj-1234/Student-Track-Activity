<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - StudentTrack</title>
    <link rel="stylesheet" href="../css/index.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body style="display: flex; align-items: center; justify-content: center;">
    <div class="glass-card" style="width: 100%; max-width: 400px;">
        <h2 style="text-align: center;">Welcome Back</h2>
        <p style="text-align: center; color: var(--text-secondary); margin-bottom: 2rem;">Sign in to your account</p>
        
        <form id="login-form">
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="email" required placeholder="name@example.com">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" required placeholder="••••••••">
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%;">Sign In</button>
        </form>
        
        <p style="text-align: center; margin-top: 1.5rem; color: var(--text-secondary);">
            Don't have an account? <a href="register.html" style="color: var(--primary-color);">Register</a>
        </p>
    </div>

    <script type="module">
        import api from '../js/services/api.js';
        import auth from '../js/utils/auth.js';

        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                const data = await api.post('/auth/login', { email, password });
                auth.setToken(data.token);
                auth.setUser(data);
                window.location.href = 'dashboard.html';
            } catch (err) {
                alert(err.message);
            }
        });
    </script>
</body>
</html>
