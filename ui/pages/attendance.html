<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attendance - StudentTrack</title>
    <link rel="stylesheet" href="../css/index.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="main-content">
        <header style="margin-bottom: 2rem;">
            <h1>Attendance Tracker</h1>
            <p style="color: var(--text-secondary);">Mark your daily attendance</p>
        </header>

        <div class="glass-card" style="margin-bottom: 2rem;">
            <h3>Mark Attendance</h3>
            <form id="attendance-form" style="display: flex; gap: 1rem; align-items: flex-end; margin-top: 1rem;">
                <div class="form-group" style="margin-bottom: 0; flex: 1;">
                    <label>Date</label>
                    <input type="date" id="date" required>
                </div>
                <div class="form-group" style="margin-bottom: 0; flex: 1;">
                    <label>Status</label>
                    <select id="status">
                        <option value="PRESENT">Present</option>
                        <option value="ABSENT">Absent</option>
                    </select>
                </div>
                <button type="submit" class="btn btn-primary">Submit</button>
            </form>
        </div>

        <div class="glass-card">
            <h3>Attendance History</h3>
            <table style="width: 100%; border-collapse: collapse; margin-top: 1rem;">
                <thead>
                    <tr style="text-align: left; color: var(--text-secondary); border-bottom: 1px solid var(--glass-border);">
                        <th style="padding: 1rem;">Date</th>
                        <th style="padding: 1rem;">Status</th>
                    </tr>
                </thead>
                <tbody id="attendance-list">
                    <!-- Data will be injected here -->
                </tbody>
            </table>
        </div>
    </div>

    <script type="module">
        import { initSidebar } from '../js/components/sidebar.js';
        import auth from '../js/utils/auth.js';
        import api from '../js/services/api.js';

        auth.checkAuth();
        initSidebar();

        const user = auth.getUser();
        document.getElementById('date').valueAsDate = new Date();

        async function loadAttendance() {
            try {
                const data = await api.get(`/attendance/student/${user.id}`);
                const list = document.getElementById('attendance-list');
                list.innerHTML = data.map(item => `
                    <tr style="border-bottom: 1px solid var(--glass-border);">
                        <td style="padding: 1rem;">${item.date}</td>
                        <td style="padding: 1rem;">
                            <span style="color: ${item.status === 'PRESENT' ? 'var(--accent-green)' : 'var(--accent-red)'}">
                                ${item.status}
                            </span>
                        </td>
                    </tr>
                `).reverse().join('');
            } catch (err) {
                console.error(err);
            }
        }

        document.getElementById('attendance-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const date = document.getElementById('date').value;
            const status = document.getElementById('status').value;

            try {
                await api.post('/attendance/mark', { studentId: user.id, date, status });
                loadAttendance();
                alert('Attendance marked!');
            } catch (err) {
                alert(err.message);
            }
        });

        loadAttendance();
    </script>
</body>
</html>
